<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8"/>
      <stop offset="50%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="110" fill="url(#bg)"/>
  <!-- Book outline -->
  <path d="M160 140 Q160 120 180 120 L332 120 Q352 120 352 140 L352 340 Q352 360 332 360 L256 360 L180 360 Q160 360 160 340 Z" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="8" stroke-linejoin="round"/>
  <!-- Center line -->
  <line x1="256" y1="130" x2="256" y2="350" stroke="rgba(255,255,255,0.3)" stroke-width="4"/>
  <!-- Text lines left -->
  <line x1="185" y1="165" x2="235" y2="165" stroke="rgba(255,255,255,0.5)" stroke-width="6" stroke-linecap="round"/>
  <line x1="185" y1="195" x2="225" y2="195" stroke="rgba(255,255,255,0.5)" stroke-width="6" stroke-linecap="round"/>
  <!-- Text lines right -->
  <line x1="275" y1="165" x2="330" y2="165" stroke="rgba(255,255,255,0.5)" stroke-width="6" stroke-linecap="round"/>
  <line x1="275" y1="195" x2="320" y2="195" stroke="rgba(255,255,255,0.5)" stroke-width="6" stroke-linecap="round"/>
  <!-- W letter -->
  <text x="256" y="310" font-family="Arial,Helvetica,sans-serif" font-size="130" font-weight="900" fill="white" text-anchor="middle">W</text>
  <!-- Speech bubble tail -->
  <path d="M230 360 L256 395 L282 360" fill="url(#bg)" stroke="none"/>
  <path d="M230 360 L256 395 L282 360" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="8" stroke-linejoin="round" stroke-linecap="round"/>
</svg>
